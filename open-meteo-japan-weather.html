<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>今日の天気 | 気象庁</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #5c6875;
        --line: #dce5ec;
        --panel: rgba(255, 255, 255, 0.94);
        --accent: #087f8c;
        --accent-dark: #075e69;
        --sun: #f2b84b;
        --rain: #3f7fbf;
        --danger: #a83226;
        font-family:
          "Yu Gothic", "Meiryo", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 82% 12%, rgba(242, 184, 75, 0.34), transparent 28%),
          radial-gradient(circle at 16% 18%, rgba(8, 127, 140, 0.24), transparent 32%),
          linear-gradient(145deg, #eef8fa 0%, #ffffff 52%, #eaf2f7 100%);
        background-attachment: fixed;
        background-position: center;
        background-size: cover;
        color: var(--ink);
      }

      button {
        font: inherit;
      }

      .app {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 34px 0;
      }

      .topbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent-dark);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.25rem);
        line-height: 1.05;
      }

      .refresh-button,
      .city-button {
        border: 1px solid transparent;
        border-radius: 8px;
        cursor: pointer;
      }

      .refresh-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 44px;
        padding: 0 18px;
        background: var(--accent);
        color: white;
        font-weight: 800;
      }

      .refresh-button:hover {
        background: var(--accent-dark);
      }

      .refresh-button:disabled {
        cursor: wait;
        opacity: 0.68;
      }

      .city-switcher {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .city-button {
        min-height: 64px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.78);
        border-color: rgba(220, 229, 236, 0.96);
        color: var(--ink);
        text-align: left;
      }

      .city-button:hover {
        border-color: var(--accent);
      }

      .city-button[aria-pressed="true"] {
        background: var(--panel);
        border-color: var(--accent);
        box-shadow: inset 0 4px 0 var(--accent);
      }

      .city-name-small {
        display: block;
        font-weight: 900;
      }

      .city-temp-small {
        display: block;
        margin-top: 4px;
        color: var(--accent-dark);
        font-size: 1.1rem;
        font-weight: 900;
      }

      .weather-card {
        min-height: 520px;
        padding: clamp(20px, 4vw, 34px);
        border: 1px solid rgba(220, 229, 236, 0.95);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 22px 54px rgba(23, 32, 42, 0.14);
        backdrop-filter: blur(8px);
      }

      .card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 20px;
      }

      .place-label,
      .observed-time,
      .meta-label {
        color: var(--muted);
      }

      .place-label {
        margin: 0 0 6px;
        font-weight: 800;
      }

      .city-title {
        margin: 0;
        font-size: clamp(2.4rem, 8vw, 5rem);
        line-height: 1;
      }

      .observed-time {
        margin: 10px 0 0;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .weather-icon {
        display: grid;
        flex: 0 0 auto;
        place-items: center;
        width: clamp(76px, 13vw, 108px);
        height: clamp(76px, 13vw, 108px);
        border: 1px solid #e7edf3;
        border-radius: 50%;
        background: #f7fafc;
        font-size: clamp(2.8rem, 7vw, 4.5rem);
      }

      .current {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: end;
        gap: 18px;
        padding: 14px 0 26px;
        border-bottom: 1px solid #e6edf4;
      }

      .temperature {
        font-size: clamp(4.6rem, 18vw, 9rem);
        font-weight: 950;
        line-height: 0.9;
        white-space: nowrap;
      }

      .condition {
        color: var(--accent-dark);
        font-size: clamp(1.45rem, 4vw, 2.4rem);
        font-weight: 950;
        text-align: right;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 22px;
      }

      .metric {
        min-width: 0;
        padding: 16px;
        border: 1px solid #e2e9ef;
        border-radius: 8px;
        background: #fbfdfe;
      }

      .meta-label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.86rem;
        font-weight: 800;
      }

      .metric strong {
        display: block;
        overflow-wrap: anywhere;
        font-size: clamp(1.15rem, 3vw, 1.55rem);
        line-height: 1.25;
      }

      .notice {
        margin: 0;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        font-weight: 800;
      }

      .notice.error {
        border-color: #efc2ba;
        background: #fff4f2;
        color: var(--danger);
      }

      @media (max-width: 760px) {
        .app {
          width: min(100% - 24px, 1040px);
          padding: 24px 0;
        }

        .topbar {
          align-items: stretch;
          flex-direction: column;
        }

        .refresh-button {
          width: 100%;
        }

        .city-switcher,
        .metrics {
          grid-template-columns: 1fr;
        }

        .weather-card {
          min-height: 0;
        }

        .current {
          grid-template-columns: 1fr;
        }

        .temperature {
          font-size: clamp(4rem, 17vw, 5.7rem);
        }

        .condition {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Japan Meteorological Agency</p>
          <h1>今日の天気</h1>
        </div>
        <button class="refresh-button" id="refreshButton" type="button" aria-label="天気を更新">
          <span aria-hidden="true">↻</span>
          更新
        </button>
      </header>

      <nav class="city-switcher" id="citySwitcher" aria-label="都市を選択"></nav>

      <section class="weather-card" id="weatherCard" aria-live="polite">
        <p class="notice">天気情報を取得しています。</p>
      </section>
    </main>

    <script>
      const cities = [
        { id: "takamatsu", name: "高松", officeCode: "370000", weatherArea: "香川県", tempArea: "高松" },
        { id: "tokyo", name: "東京", officeCode: "130000", weatherArea: "東京地方", tempArea: "東京" },
        { id: "osaka", name: "大阪", officeCode: "270000", weatherArea: "大阪府", tempArea: "大阪" },
      ];

      const weatherMap = new Map([
        ["1", ["晴れ", "☀️"]],
        ["2", ["くもり", "☁️"]],
        ["3", ["雨", "🌧️"]],
        ["4", ["雪", "🌨️"]],
      ]);

      const switcher = document.querySelector("#citySwitcher");
      const weatherCard = document.querySelector("#weatherCard");
      const refreshButton = document.querySelector("#refreshButton");
      const cache = new Map();
      let selectedCityId = cities[0].id;

      refreshButton.addEventListener("click", () => loadAllWeather(true));
      renderCityButtons();
      loadAllWeather();

      function renderCityButtons() {
        switcher.replaceChildren(
          ...cities.map((city) => {
            const button = document.createElement("button");
            button.className = "city-button";
            button.type = "button";
            button.dataset.cityId = city.id;
            button.setAttribute("aria-pressed", String(city.id === selectedCityId));
            button.innerHTML = `
              <span class="city-name-small">${city.name}</span>
              <span class="city-temp-small">${getCitySummary(city.id)}</span>
            `;
            button.addEventListener("click", () => {
              selectedCityId = city.id;
              renderCityButtons();
              renderSelectedWeather();
            });
            return button;
          }),
        );
      }

      async function loadAllWeather(forceRefresh = false) {
        setLoading(true);
        weatherCard.replaceChildren(renderNotice("各地の天気情報を取得しています。"));

        try {
          const results = await Promise.allSettled(
            cities.map(async (city) => {
              if (cache.has(city.id) && !forceRefresh) return cache.get(city.id);
              const data = await fetchWeather(city);
              cache.set(city.id, data);
              return data;
            }),
          );

          const selectedResult = results[cities.findIndex((city) => city.id === selectedCityId)];
          renderCityButtons();

          if (selectedResult?.status === "rejected" && !cache.has(selectedCityId)) {
            throw selectedResult.reason;
          }

          renderSelectedWeather();
        } catch (error) {
          console.error(error);
          weatherCard.replaceChildren(
            renderNotice(
              "気象庁の天気情報を取得できませんでした。通信状態を確認して、更新ボタンで再取得してください。",
              true,
            ),
          );
        } finally {
          setLoading(false);
        }
      }

      function renderSelectedWeather() {
        const city = cities.find((item) => item.id === selectedCityId);
        const data = cache.get(selectedCityId);
        if (!city || !data) return;
        renderWeather(city, data);
      }

      async function loadWeather(cityId, forceRefresh = false) {
        const city = cities.find((item) => item.id === cityId);
        if (!city) return;

        if (cache.has(cityId) && !forceRefresh) {
          renderWeather(city, cache.get(cityId));
          return;
        }

        setLoading(true);
        weatherCard.replaceChildren(renderNotice(`${city.name}の天気情報を取得しています。`));

        try {
          const data = await fetchWeather(city);
          cache.set(cityId, data);
          renderCityButtons();
          renderWeather(city, data);
        } catch (error) {
          console.error(error);
          weatherCard.replaceChildren(
            renderNotice(
              "気象庁の天気情報を取得できませんでした。通信状態を確認して、更新ボタンで再取得してください。",
              true,
            ),
          );
        } finally {
          setLoading(false);
        }
      }

      async function fetchWeather(city) {
        const controller = new AbortController();
        const timeoutId = window.setTimeout(() => controller.abort(), 15000);

        try {
          const response = await fetch(`https://www.jma.go.jp/bosai/forecast/data/forecast/${city.officeCode}.json`, {
            signal: controller.signal,
          });

          if (!response.ok) {
            throw new Error(`JMA request failed: ${response.status}`);
          }

          return normalizeJmaForecast(city, await response.json());
        } finally {
          window.clearTimeout(timeoutId);
        }
      }

      function normalizeJmaForecast(city, payload) {
        const today = payload[0];
        const weatherSeries = today.timeSeries[0];
        const popSeries = today.timeSeries[1];
        const tempSeries = today.timeSeries[2];
        const weatherArea =
          weatherSeries.areas.find((area) => area.area.name === city.weatherArea) ?? weatherSeries.areas[0];
        const popArea = popSeries.areas.find((area) => area.area.name === city.weatherArea) ?? popSeries.areas[0];
        const tempArea = tempSeries.areas.find((area) => area.area.name === city.tempArea) ?? tempSeries.areas[0];

        return {
          reportDatetime: today.reportDatetime,
          publishingOffice: today.publishingOffice,
          weatherCode: weatherArea.weatherCodes[0],
          weatherText: weatherArea.weathers[0],
          wind: weatherArea.winds[0],
          pop: popArea.pops.find((value) => value !== "") ?? "--",
          tempNow: tempArea.temps[0],
          tempMin: tempArea.temps[1],
          tempMax: tempArea.temps[3] ?? tempArea.temps[0],
        };
      }

      function renderWeather(city, data) {
        const code = String(data.weatherCode ?? "");
        const [label, icon] = weatherMap.get(code[0]) ?? [data.weatherText || "不明", "—"];

        weatherCard.innerHTML = `
          <header class="card-head">
            <div>
              <p class="place-label">今日の予報</p>
              <h2 class="city-title">${city.name}</h2>
              <p class="observed-time">${formatTime(data.reportDatetime)} 発表・${data.publishingOffice}</p>
            </div>
            <div class="weather-icon" aria-label="${label}">${icon}</div>
          </header>

          <div class="current">
            <div class="temperature">${formatValue(data.tempNow)}℃</div>
            <div class="condition">${label}</div>
          </div>

          <div class="metrics" aria-label="天気の詳細">
            <div class="metric">
              <span class="meta-label">最高 / 最低</span>
              <strong>${formatValue(data.tempMax)}℃ / ${formatValue(data.tempMin)}℃</strong>
            </div>
            <div class="metric">
              <span class="meta-label">天気 / 降水確率</span>
              <strong>${data.weatherText} / ${data.pop}%</strong>
            </div>
            <div class="metric">
              <span class="meta-label">風</span>
              <strong>${data.wind}</strong>
            </div>
          </div>
        `;
      }

      function getCitySummary(cityId) {
        const data = cache.get(cityId);
        if (!data) return "未取得";
        const [label] = weatherMap.get(String(data.weatherCode ?? "")[0]) ?? ["不明"];
        return `${formatValue(data.tempNow)}℃・${label}`;
      }

      function renderNotice(text, isError = false) {
        const notice = document.createElement("p");
        notice.className = isError ? "notice error" : "notice";
        notice.textContent = text;
        return notice;
      }

      function setLoading(isLoading) {
        refreshButton.disabled = isLoading;
      }

      function round(value) {
        return Number.isFinite(value) ? Math.round(value) : "--";
      }

      function formatValue(value) {
        return value === "" || value == null ? "--" : value;
      }

      function formatTime(value) {
        if (!value) return "--";
        return new Intl.DateTimeFormat("ja-JP", {
          month: "numeric",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        }).format(new Date(value));
      }
    </script>
  </body>
</html>
