<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Weather · 天気</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --accent: #38bdf8;
    --accent-soft: rgba(56, 189, 248, 0.28);
    --accent-2: #6366f1;
    --text: #eef2fb;
    --sub-text: rgba(210, 218, 240, 0.60);
    --faint-text: rgba(210, 218, 240, 0.34);
    --card-bg: rgba(17, 21, 40, 0.62);
    --card-border: rgba(255, 255, 255, 0.08);
    --panel-bg: rgba(255, 255, 255, 0.035);
    --panel-border: rgba(255, 255, 255, 0.07);
    --hairline: rgba(255, 255, 255, 0.07);
    --transition-color: 0.7s ease;
  }
  *{ box-sizing: border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 32px 16px;
    background:
      radial-gradient(110% 80% at 12% -5%, rgba(51, 57, 120, 0.55) 0%, transparent 50%),
      radial-gradient(120% 90% at 105% 105%, rgba(24, 55, 92, 0.55) 0%, transparent 52%),
      linear-gradient(165deg, #0a0d1f 0%, #080a17 55%, #05060e 100%);
    color: var(--text);
    overflow-x: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }
  .blob{
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.42;
    pointer-events: none;
    z-index: 0;
    transition: background var(--transition-color);
  }
  .blob-1{
    width: 400px; height: 400px;
    top: -140px; left: -120px;
    background: var(--accent);
    animation: drift1 18s ease-in-out infinite;
  }
  .blob-2{
    width: 340px; height: 340px;
    bottom: -160px; right: -100px;
    background: var(--accent-2);
    animation: drift2 22s ease-in-out infinite;
  }
  @keyframes drift1{
    0%, 100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(40px, 34px) scale(1.08); }
  }
  @keyframes drift2{
    0%, 100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(-32px, -26px) scale(1.06); }
  }
  .app{
    width:100%;
    max-width: 456px;
    position: relative;
    z-index: 1;
  }

  /* ---------- Header ---------- */
  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 20px;
    padding: 0 4px;
  }
  .brand{
    display:inline-flex;
    align-items:center;
    gap: 9px;
    font-family: "Space Grotesk", sans-serif;
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .brand .dot{
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px 2px var(--accent-soft);
    transition: background var(--transition-color), box-shadow var(--transition-color);
  }
  .brand .sub{
    color: var(--faint-text);
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .source-pill{
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--sub-text);
    border: 1px solid var(--hairline);
    padding: 5px 11px;
    border-radius: 999px;
    background: var(--panel-bg);
  }

  /* ---------- Tabs ---------- */
  .city-tabs{
    position: relative;
    display:flex;
    background: rgba(255,255,255,0.035);
    padding: 5px;
    border-radius: 15px;
    margin-bottom: 16px;
    border: 1px solid var(--panel-border);
  }
  .tab-indicator{
    position: absolute;
    top: 5px; bottom: 5px;
    left: 5px;
    width: 100px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 6px 18px var(--accent-soft);
    transition: left 0.38s cubic-bezier(.65,0,.35,1), width 0.38s cubic-bezier(.65,0,.35,1), background var(--transition-color);
    z-index: 0;
  }
  .city-tabs button{
    position: relative;
    z-index: 1;
    flex:1;
    border:none;
    background: transparent;
    color: var(--sub-text);
    padding: 11px 8px;
    font-family: inherit;
    font-size: 14.5px;
    font-weight: 700;
    border-radius: 11px;
    cursor:pointer;
    transition: color 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .city-tabs button.active{ color: #060814; }

  /* ---------- Card ---------- */
  .card{
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 26px;
    padding: 26px 24px 22px;
    backdrop-filter: blur(26px);
    -webkit-backdrop-filter: blur(26px);
    box-shadow: 0 24px 60px -18px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
    overflow:hidden;
    min-height: 340px;
  }
  .card::before{
    content:"";
    position:absolute;
    inset: 0;
    border-radius: 26px;
    padding: 1px;
    background: linear-gradient(140deg, var(--accent-soft), transparent 38%, transparent 62%, rgba(255,255,255,0.05));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events:none;
    opacity: 0.9;
    transition: background var(--transition-color);
  }

  /* ---------- Loading / error ---------- */
  .state{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height: 288px;
    gap: 14px;
    text-align:center;
    color: var(--sub-text);
  }
  .spinner{
    width:32px; height:32px;
    border: 3px solid rgba(255,255,255,0.10);
    border-top-color: var(--accent);
    border-radius:50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .state.error{ color: #ffb4b4; }
  .state.error .glyph{ font-size: 36px; }
  .retry-btn{
    margin-top: 4px;
    padding: 9px 20px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.06);
    color:#fff;
    font-family: inherit;
    font-size:13.5px;
    font-weight: 600;
    cursor:pointer;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .retry-btn:hover{ background: rgba(255,255,255,0.12); transform: translateY(-1px); }

  .content{
    position:relative;
    z-index:1;
    animation: fadeUp 0.55s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes fadeUp{
    from{ opacity: 0; transform: translateY(10px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  /* ---------- Location row ---------- */
  .location{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 2px;
  }
  .location .city-name{
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.01em;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .location .city-name .pin{ font-size: 13px; opacity: 0.7; }
  .location .updated{
    font-size: 10.5px;
    letter-spacing: 0.03em;
    color: var(--faint-text);
  }

  /* ---------- Hero ---------- */
  .hero{
    display:flex;
    align-items:center;
    gap: 6px;
    margin: 12px 0 4px;
  }
  .icon-wrap{
    position: relative;
    width: 108px;
    height: 108px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .icon-glow{
    position:absolute;
    inset: 6px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-soft) 0%, transparent 68%);
    filter: blur(8px);
    transition: background var(--transition-color);
  }
  .emoji{
    position: relative;
    font-size: 82px;
    line-height:1;
    filter: drop-shadow(0 10px 16px rgba(0,0,0,0.5));
    animation: floaty 3.4s ease-in-out infinite;
  }
  @keyframes floaty{
    0%, 100%{ transform: translateY(0px); }
    50%{ transform: translateY(-7px); }
  }
  .hero-right{ flex:1; min-width:0; }
  .temp{
    font-family: "Space Grotesk", sans-serif;
    font-size: 62px;
    font-weight: 600;
    line-height:0.95;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #ffffff 18%, var(--accent) 130%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: background var(--transition-color);
  }
  .temp sup{
    font-size: 22px;
    font-weight: 500;
    vertical-align: super;
    -webkit-text-fill-color: var(--sub-text);
  }
  .condition{
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-top: 8px;
  }
  .hi-lo{
    display:flex;
    gap: 14px;
    margin-top: 6px;
    font-size: 12.5px;
    color: var(--sub-text);
    font-family: "Space Grotesk", sans-serif;
  }
  .hi-lo b{ color: var(--text); font-weight: 600; }
  .hi-lo .feels{ color: var(--faint-text); }

  .divider{
    height:1px;
    background: var(--hairline);
    margin: 18px 0 16px;
  }

  /* ---------- Section labels ---------- */
  .sec-label{
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--faint-text);
    margin: 0 0 10px 2px;
    font-weight: 700;
  }

  /* ---------- Hourly strip ---------- */
  .hourly{
    display:flex;
    gap: 8px;
    overflow-x:auto;
    padding-bottom: 4px;
    margin: 0 -4px;
    padding-left: 4px; padding-right: 4px;
    scrollbar-width: none;
  }
  .hourly::-webkit-scrollbar{ display:none; }
  .hour{
    flex: 0 0 auto;
    width: 58px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 10px 4px;
    text-align:center;
  }
  .hour.now{
    border-color: var(--accent-soft);
    background: linear-gradient(180deg, var(--accent-soft), var(--panel-bg));
  }
  .hour .h-time{ font-size: 10.5px; color: var(--sub-text); font-family: "Space Grotesk", sans-serif; }
  .hour .h-ico{ font-size: 20px; margin: 6px 0 5px; }
  .hour .h-temp{ font-size: 13.5px; font-weight: 700; font-family: "Space Grotesk", sans-serif; }
  .hour .h-rain{ font-size: 9.5px; color: var(--accent); margin-top: 3px; min-height: 12px; }

  /* ---------- Detail stats ---------- */
  .stats{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .stat{
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 15px;
    padding: 12px 8px;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .stat:hover{ transform: translateY(-2px); border-color: rgba(255,255,255,0.16); }
  .stat .label{
    font-size: 10px;
    color: var(--sub-text);
    letter-spacing: 0.04em;
    display:flex;
    align-items:center;
    gap: 5px;
    margin-bottom: 7px;
  }
  .stat .value{
    font-family: "Space Grotesk", sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .stat .value .unit{
    font-size: 10.5px;
    font-weight: 500;
    color: var(--sub-text);
    margin-left: 2px;
  }

  /* ---------- Daily forecast ---------- */
  .daily{ display:flex; flex-direction:column; gap: 2px; }
  .day{
    display:grid;
    grid-template-columns: 46px 26px 1fr auto;
    align-items:center;
    gap: 10px;
    padding: 9px 4px;
    border-top: 1px solid var(--hairline);
  }
  .day:first-child{ border-top: none; }
  .day .d-name{ font-size: 13px; font-weight: 700; }
  .day .d-name.wknd{ color: var(--accent); }
  .day .d-ico{ font-size: 19px; text-align:center; }
  .day .d-rain{
    font-size: 11px;
    color: var(--accent);
    text-align:left;
    font-family: "Space Grotesk", sans-serif;
  }
  .day .d-range{
    display:flex;
    align-items:center;
    gap: 8px;
    font-family: "Space Grotesk", sans-serif;
    font-size: 13px;
    justify-content:flex-end;
  }
  .day .d-range .lo{ color: var(--sub-text); width: 28px; text-align:right; }
  .day .d-range .hi{ color: var(--text); font-weight: 600; width: 28px; text-align:right; }
  .day .d-bar{
    width: 54px; height: 4px;
    border-radius: 3px;
    background: linear-gradient(90deg, #67e8f9, var(--accent), #fb923c);
    opacity: 0.7;
  }

  footer{
    text-align:center;
    margin-top: 16px;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faint-text);
  }

  @media (max-width: 400px){
    .icon-wrap{ width: 88px; height: 88px; }
    .emoji{ font-size: 66px; }
    .temp{ font-size: 52px; }
    .card{ padding: 22px 16px 18px; }
    .stat .value{ font-size: 16px; }
  }
</style>
</head>
<body>
  <div class="blob blob-1" id="blob1"></div>
  <div class="blob blob-2" id="blob2"></div>

  <div class="app">
    <div class="header">
      <div class="brand"><span class="dot" id="brandDot"></span>Weather<span class="sub">JP</span></div>
      <div class="source-pill">Live · wttr.in</div>
    </div>

    <div class="city-tabs" id="cityTabs">
      <div class="tab-indicator" id="tabIndicator"></div>
      <button data-city="takamatsu" class="active">高松</button>
      <button data-city="tokyo">東京</button>
      <button data-city="osaka">大阪</button>
      <button data-city="okinawa">沖縄</button>
    </div>

    <div class="card" id="card">
      <div class="state" id="loadingState">
        <div class="spinner"></div>
        <div>読み込み中...</div>
      </div>
    </div>

    <footer>Data provided by wttr.in</footer>
  </div>

<script>
(function(){
  const CITIES = {
    takamatsu: { name: "高松", region: "香川県", lat: 34.34, lon: 134.05 },
    tokyo:     { name: "東京", region: "東京都", lat: 35.6762, lon: 139.6503 },
    osaka:     { name: "大阪", region: "大阪府", lat: 34.6937, lon: 135.5023 },
    okinawa:   { name: "沖縄", region: "沖縄県", lat: 26.2124, lon: 127.6809 }
  };

  const WEATHER_CODE_MAP = {
    113: { emoji: "☀️", label: "晴れ", category: "sunny" },
    116: { emoji: "⛅", label: "晴れ時々くもり", category: "cloud" },
    119: { emoji: "☁️", label: "くもり", category: "cloud" },
    122: { emoji: "☁️", label: "どんより", category: "cloud" },
    143: { emoji: "🌫️", label: "霧", category: "fog" },
    176: { emoji: "🌦️", label: "にわか雨の可能性", category: "rain" },
    179: { emoji: "🌨️", label: "小雪の可能性", category: "snow" },
    182: { emoji: "🌨️", label: "みぞれの可能性", category: "snow" },
    185: { emoji: "🌧️", label: "着氷性の霧雨の可能性", category: "rain" },
    200: { emoji: "⛈️", label: "雷雨の可能性", category: "thunder" },
    227: { emoji: "❄️", label: "地吹雪", category: "snow" },
    230: { emoji: "❄️", label: "吹雪", category: "snow" },
    248: { emoji: "🌫️", label: "霧", category: "fog" },
    260: { emoji: "🌫️", label: "着氷性の霧", category: "fog" },
    263: { emoji: "🌦️", label: "小雨", category: "rain" },
    266: { emoji: "🌦️", label: "霧雨", category: "rain" },
    281: { emoji: "🌧️", label: "着氷性の霧雨", category: "rain" },
    284: { emoji: "🌧️", label: "強い着氷性の霧雨", category: "rain" },
    293: { emoji: "🌦️", label: "小雨", category: "rain" },
    296: { emoji: "🌧️", label: "小雨", category: "rain" },
    299: { emoji: "🌧️", label: "雨", category: "rain" },
    302: { emoji: "🌧️", label: "雨", category: "rain" },
    305: { emoji: "🌧️", label: "大雨", category: "rain" },
    308: { emoji: "🌧️", label: "大雨", category: "rain" },
    311: { emoji: "🌧️", label: "着氷性の雨", category: "rain" },
    314: { emoji: "🌧️", label: "強い着氷性の雨", category: "rain" },
    317: { emoji: "🌨️", label: "みぞれ", category: "snow" },
    320: { emoji: "🌨️", label: "強いみぞれ", category: "snow" },
    323: { emoji: "🌨️", label: "小雪", category: "snow" },
    326: { emoji: "🌨️", label: "小雪", category: "snow" },
    329: { emoji: "🌨️", label: "雪", category: "snow" },
    332: { emoji: "🌨️", label: "雪", category: "snow" },
    335: { emoji: "❄️", label: "大雪", category: "snow" },
    338: { emoji: "❄️", label: "大雪", category: "snow" },
    350: { emoji: "🧊", label: "あられ", category: "snow" },
    353: { emoji: "🌦️", label: "にわか雨", category: "rain" },
    356: { emoji: "🌧️", label: "強いにわか雨", category: "rain" },
    359: { emoji: "⛈️", label: "激しいにわか雨", category: "thunder" },
    362: { emoji: "🌨️", label: "にわかみぞれ", category: "snow" },
    365: { emoji: "🌨️", label: "強いにわかみぞれ", category: "snow" },
    368: { emoji: "🌨️", label: "にわか雪", category: "snow" },
    371: { emoji: "❄️", label: "強いにわか雪", category: "snow" },
    374: { emoji: "🧊", label: "にわかあられ", category: "snow" },
    377: { emoji: "🧊", label: "強いにわかあられ", category: "snow" },
    386: { emoji: "⛈️", label: "雷雨", category: "thunder" },
    389: { emoji: "⛈️", label: "激しい雷雨", category: "thunder" },
    392: { emoji: "⛈️", label: "雷雪", category: "thunder" },
    395: { emoji: "⛈️", label: "激しい雷雪", category: "thunder" }
  };

  const CATEGORY_ACCENT = {
    sunny:   { accent: "#fb923c", soft: "rgba(251, 146, 60, 0.28)" },
    cloud:   { accent: "#94a3b8", soft: "rgba(148, 163, 184, 0.28)" },
    fog:     { accent: "#a1a1aa", soft: "rgba(161, 161, 170, 0.28)" },
    rain:    { accent: "#38bdf8", soft: "rgba(56, 189, 248, 0.28)" },
    snow:    { accent: "#67e8f9", soft: "rgba(103, 232, 249, 0.28)" },
    thunder: { accent: "#a78bfa", soft: "rgba(167, 139, 250, 0.28)" }
  };

  const WDAY = ["日","月","火","水","木","金","土"];

  function getWeatherInfo(code){
    return WEATHER_CODE_MAP[code] || { emoji: "❓", label: "不明", category: "cloud" };
  }

  function applyAccent(category){
    const theme = CATEGORY_ACCENT[category] || CATEGORY_ACCENT.cloud;
    document.documentElement.style.setProperty("--accent", theme.accent);
    document.documentElement.style.setProperty("--accent-soft", theme.soft);
  }

  const cardEl = document.getElementById("card");
  const tabsEl = document.getElementById("cityTabs");
  const indicatorEl = document.getElementById("tabIndicator");
  let currentCity = "takamatsu";
  let requestToken = 0;

  function moveIndicator(btn){
    indicatorEl.style.left = btn.offsetLeft + "px";
    indicatorEl.style.width = btn.offsetWidth + "px";
  }

  function renderLoading(){
    cardEl.innerHTML = `
      <div class="state" id="loadingState">
        <div class="spinner"></div>
        <div>読み込み中...</div>
      </div>
    `;
  }

  function renderError(message){
    cardEl.innerHTML = `
      <div class="state error">
        <div class="glyph">⚠️</div>
        <div>${message}</div>
        <button class="retry-btn" id="retryBtn">再読み込み</button>
      </div>
    `;
    const retryBtn = document.getElementById("retryBtn");
    if (retryBtn) retryBtn.addEventListener("click", () => loadCity(currentCity));
  }

  // Build the next ~8 hourly cells starting from the current hour
  function buildHourly(weatherDays){
    const now = new Date();
    const nowHour = now.getHours();
    // Flatten hourly entries across days into { hour, code, temp, rain }
    const slots = [];
    weatherDays.forEach((day, di) => {
      (day.hourly || []).forEach(h => {
        const hh = Math.floor(Number(h.time) / 100); // 0,3,6...21
        slots.push({
          dayIndex: di,
          hour: hh,
          code: Number(h.weatherCode),
          temp: Math.round(h.tempC),
          rain: Number(h.chanceofrain)
        });
      });
    });
    // Pick slots from "now" onward
    const upcoming = slots.filter(s => s.dayIndex > 0 || s.hour >= nowHour - 1).slice(0, 8);
    const list = upcoming.length ? upcoming : slots.slice(0, 8);

    return list.map((s, i) => {
      const info = getWeatherInfo(s.code);
      const timeLabel = i === 0 ? "今" : String(s.hour).padStart(2, "0") + "時";
      const rainLabel = s.rain >= 20 ? `💧${s.rain}%` : "";
      return `
        <div class="hour ${i === 0 ? "now" : ""}">
          <div class="h-time">${timeLabel}</div>
          <div class="h-ico">${info.emoji}</div>
          <div class="h-temp">${s.temp}°</div>
          <div class="h-rain">${rainLabel}</div>
        </div>`;
    }).join("");
  }

  function buildDaily(weatherDays){
    return weatherDays.slice(0, 3).map((day, i) => {
      const noon = (day.hourly || []).find(h => Number(h.time) === 1200) || (day.hourly || [])[4] || {};
      const info = getWeatherInfo(Number(noon.weatherCode));
      const d = new Date(day.date + "T00:00:00");
      const wd = d.getDay();
      const name = i === 0 ? "今日" : (i === 1 ? "明日" : WDAY[wd] + "曜");
      const wknd = (wd === 0 || wd === 6) ? "wknd" : "";
      const rain = Number(noon.chanceofrain || 0);
      return `
        <div class="day">
          <div class="d-name ${wknd}">${name}</div>
          <div class="d-ico">${info.emoji}</div>
          <div class="d-rain">${rain >= 10 ? "💧" + rain + "%" : ""}</div>
          <div class="d-range">
            <span class="lo">${Math.round(day.mintempC)}°</span>
            <span class="d-bar"></span>
            <span class="hi">${Math.round(day.maxtempC)}°</span>
          </div>
        </div>`;
    }).join("");
  }

  function renderWeather(city, data){
    const current = data.current_condition[0];
    const days = data.weather || [];
    const today = days[0];
    const info = getWeatherInfo(Number(current.weatherCode));
    applyAccent(info.category);

    const updatedStr = new Date().toLocaleString("ja-JP", { timeZone: "Asia/Tokyo", hour: "2-digit", minute: "2-digit" });
    const maxT = today ? Math.round(today.maxtempC) : null;
    const minT = today ? Math.round(today.mintempC) : null;
    const astro = today && today.astronomy ? today.astronomy[0] : null;
    const uv = current.uvIndex != null ? current.uvIndex : (today ? today.uvIndex : "--");

    cardEl.innerHTML = `
      <div class="content">
        <div class="location">
          <div class="city-name"><span class="pin">📍</span>${city.name}<span style="color:var(--faint-text);font-weight:400;font-size:12px;">${city.region}</span></div>
          <div class="updated">${updatedStr} 更新</div>
        </div>

        <div class="hero">
          <div class="icon-wrap">
            <div class="icon-glow"></div>
            <div class="emoji">${info.emoji}</div>
          </div>
          <div class="hero-right">
            <div class="temp">${Math.round(current.temp_C)}<sup>°C</sup></div>
            <div class="condition">${info.label}</div>
            <div class="hi-lo">
              <span>最高 <b>${maxT !== null ? maxT : "--"}°</b></span>
              <span>最低 <b>${minT !== null ? minT : "--"}°</b></span>
              <span class="feels">体感 ${Math.round(current.FeelsLikeC)}°</span>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="sec-label">時間ごとの予報</div>
        <div class="hourly">${buildHourly(days)}</div>

        <div class="divider"></div>

        <div class="sec-label">詳細</div>
        <div class="stats">
          <div class="stat">
            <div class="label">💧 湿度</div>
            <div class="value">${Math.round(current.humidity)}<span class="unit">%</span></div>
          </div>
          <div class="stat">
            <div class="label">💨 風速</div>
            <div class="value">${Math.round(current.windspeedKmph)}<span class="unit">km/h</span></div>
          </div>
          <div class="stat">
            <div class="label">🌡️ 気圧</div>
            <div class="value">${Math.round(current.pressure)}<span class="unit">hPa</span></div>
          </div>
          <div class="stat">
            <div class="label">☀️ UV指数</div>
            <div class="value">${uv}</div>
          </div>
          <div class="stat">
            <div class="label">🌅 日の出</div>
            <div class="value" style="font-size:15px;">${astro ? astro.sunrise : "--"}</div>
          </div>
          <div class="stat">
            <div class="label">🌇 日の入</div>
            <div class="value" style="font-size:15px;">${astro ? astro.sunset : "--"}</div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="sec-label">週間予報</div>
        <div class="daily">${buildDaily(days)}</div>
      </div>
    `;
  }

  async function loadCity(cityKey){
    currentCity = cityKey;
    const city = CITIES[cityKey];
    const token = ++requestToken;
    renderLoading();

    const url = `https://wttr.in/${city.lat},${city.lon}?format=j1`;

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);

    try {
      const res = await fetch(url, { signal: controller.signal });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (token !== requestToken) return; // stale response, ignore
      renderWeather(city, data);
    } catch (err) {
      if (token !== requestToken) return;
      const message = err.name === "AbortError"
        ? "接続がタイムアウトしました。通信環境を確認してください。"
        : "天気データの取得に失敗しました。通信環境を確認してください。";
      renderError(message);
    } finally {
      clearTimeout(timeoutId);
    }
  }

  tabsEl.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-city]");
    if (!btn) return;
    tabsEl.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    moveIndicator(btn);
    loadCity(btn.dataset.city);
  });

  window.addEventListener("resize", () => {
    const active = tabsEl.querySelector("button.active");
    if (active) moveIndicator(active);
  });

  moveIndicator(tabsEl.querySelector("button.active"));
  loadCity(currentCity);
})();
</script>
</body>
</html>
